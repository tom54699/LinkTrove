name: CI
on:
  push:
    branches: [ "feature/**", "main" ]
  pull_request:
    branches: [ "main" ]
jobs:
  node:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20.x"
          cache: "npm"
      - run: npm ci --no-audit --no-fund
      - run: npm run build --if-present
      - run: npm test --if-present
